version: '3.8'

services:
  db:
    image: postgres:15
    container_name: leadgenius_db
    environment:
      POSTGRES_USER: leaduser
      POSTGRES_PASSWORD: leadpassword
      POSTGRES_DB: leadgenius
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U leaduser -d leadgenius" ]
      interval: 2s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  api:
    build: .
    container_name: leadgenius_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://leaduser:leadpassword@db:5432/leadgenius
    env_file:
      - .env

volumes:
  postgres_data:
